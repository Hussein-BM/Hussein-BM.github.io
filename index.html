<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عالمي الأدبي</title>

<style>
body {
  background: linear-gradient(black, #1a1a1a);
  color: #eee;
  font-family: "Tahoma";
  text-align: center;
  margin: 0;
}

header {
  padding: 30px;
  font-size: 30px;
  color: gold;
  border-bottom: 1px solid #444;
}

.container {
  padding: 20px;
}

.box {
  background: #111;
  margin: 20px auto;
  padding: 20px;
  width: 80%;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

h2 {
  color: gold;
}

</style>
</head>

<body>

<header>👑 عالمي الأدبي</header>

<div class="container">

<div class="box">
  <h2>نص 1</h2>
  <p>
  في عتمة الليل…  
  تولد الكلمات التي لا يراها أحد،  
  لكنها تشعر بكل شيء.  
  </p>
</div>

<div class="box">
  <h2>نص 2</h2>
  <p>
  أنا لا أكتب…  
  أنا أتنفس كلمات.  
  </p>
</div>

</div>

</body>
</html>
